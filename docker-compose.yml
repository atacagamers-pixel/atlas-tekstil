version: '3.8'

services:
  shop:
    # For production, this will be overridden by CI/CD to use ECR image
    # For local development, uncomment the build line and comment the image line
    image: atlas-tekstil:latest  # Will be replaced by CI/CD with ECR image
    # build: .  # Uncomment for local development
    
    ports:
      - "3000:3000"
    
    container_name: atlas-tekstil
    
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin123}
      - TOKEN_SECRET=${TOKEN_SECRET:-change-this-secret-in-production}
    
    restart: unless-stopped
    
    # Uncomment for persistent data
    # volumes:
    #   - ./data:/app/data
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
